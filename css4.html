<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .wrapper {
        /* 좌우 2 단 배치 */
            display: flex;
            /* 최소 높이 설정 */
            min-height: 40vh;
        }
        aside {
            /* 고정폭 */
            width: 200px;
            background: #93c5fd;
            padding: 20px;
        }
        section {
            /* 남은 공간 차지 */
            flex: 1;
            background: #e5e7eb;
            padding: 20px;
        }
        </style>
</head>
<body>
    <div class="wrapper">
        <aside>Sidebar</aside>
        <section>Main Content</section>
    </div>
</body>
</html>
