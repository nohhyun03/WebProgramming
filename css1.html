<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            /* 컨테이너를 flex 로 설정하고, 중앙 정렬하기 */
            display: flex; 
            /* 수평 중앙 정렬 */
            justify-content: center;
            /* 수직 중앙 정렬 */
            align-items: center;
            height: 200px;
            background-color: black;
            /* 아이템 사이의 간격을 10px로 설정 */
            gap : 10px;
        }

        .container div {
            width: 80px;
            height: 80px;
            color: white;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 둥근 모서리 */
            border-radius: 10px;
        }
        .container div:nth-child(1) { background: #2563eb; }
        .container div:nth-child(2) { background: #059669; }
        .container div:nth-child(3) { background: #dc2626; }
    </style>
</head>
<body>
    <h2>Flexbox 기본 정렬 실습</h2>
    <div class="container">
        <div>1</div>
        <div>2</div>
    <div>3</div>
    </div>
</body>
</html>
