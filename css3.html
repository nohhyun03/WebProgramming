<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* TODO: 아래 요구사항에 맞게 작성하세요. */
        body {
            margin: 0;
            /* 축 방향을 열로 */
            display: flex;
            flex-direction: column;

            /* 뷰포트 높이만큼 차지 */
            height: 100vh; 
        }
        header, footer {
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 10px;
        }
        main {
            /* 중앙 영역 확장 */
            flex: 1;
            background: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }
</style>
</head>
<body>
    <header>Header</header>
    <main>Main Content</main>
    <footer>Footer</footer>
</body>
</html>
